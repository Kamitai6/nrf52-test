[package]
authors = ["22266507 <s225130t@st.go.tuat.ac.jp>"]
name = "stm32h743"
edition = "2021"
version = "0.1.0"

[dependencies]
rtt-target = "0.5.0"
cortex-m = { version = "^0.7.7", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "0.7.3"
panic-halt = "0.2.0"
heapless = { version = "0.8", default-features = false }
nb = "1.1.0"

stm32h7xx-hal = {version = "0.16.0", features = ["stm32h743v","rt"]}

# cargo build/run
[profile.dev]
codegen-units = 1
debug = 2
debug-assertions = true # <-
incremental = false
# opt-level = 3 # <-
overflow-checks = true # <-

# cargo build/run --release
[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false # <-
incremental = false
lto = 'fat'
opt-level = 3 # <-
overflow-checks = false # <-
