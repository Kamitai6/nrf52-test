[package]
authors = ["22266507 <s225130t@st.go.tuat.ac.jp>"]
name = "stm32h562"
edition = "2021"
version = "0.1.0"

[dependencies]
# embassy-stm32 = { version = "0.1.0", path = "./embassy/embassy-stm32", features = ["defmt", "stm32h562ri", "memory-x", "time-driver-any", "exti", "unstable-pac", "low-power"] }
embassy-stm32 = { version = "0.1.0", path = "./embassy/embassy-stm32", features = ["defmt", "stm32h562ri", "memory-x", "time-driver-any", "unstable-pac"]  }
embassy-sync = { version = "0.6.0", path = "./embassy/embassy-sync", features = ["defmt"] }
embassy-executor = { version = "0.6.0", path = "./embassy/embassy-executor", features = ["task-arena-size-32768", "arch-cortex-m", "executor-thread", "defmt", "integrated-timers"] }
embassy-time = { version = "0.3.2", path = "./embassy/embassy-time", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }
embassy-net = { version = "0.4.0", path = "./embassy/embassy-net", features = ["defmt", "tcp", "dhcpv4", "medium-ethernet", "proto-ipv6"] }
embassy-usb = { version = "0.3.0", path = "./embassy/embassy-usb", features = ["defmt"] }
embassy-futures = { version = "0.1.0", path = "./embassy/embassy-futures"}

defmt = "0.3"
defmt-rtt = "0.4"

cortex-m = { version = "0.7.6", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "0.7.0"
panic-halt = "0.2.0"
embedded-hal = "0.2.6"
embedded-hal-1 = { package = "embedded-hal", version = "1.0" }
embedded-hal-async = { version = "1.0" }
embedded-io-async = { version = "0.6.1" }
embedded-nal-async = { version = "0.7.1" }
panic-probe = { version = "0.3", features = ["print-defmt"] }
heapless = { version = "0.8", default-features = false }
rand_core = "0.6.3"
critical-section = "1.1"
micromath = "2.0.0"
stm32-fmc = "0.3.0"
embedded-storage = "0.3.1"
static_cell = "2"

[[bin]]
name = "stm32h562"
test = false
bench = false

[profile.release]
codegen-units = 1 # better optimizations
debug = true # symbols are nice and they don't increase the size on Flash
lto = true # better optimizations