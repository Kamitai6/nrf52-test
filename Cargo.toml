[package]
authors = ["22266507 <s225130t@st.go.tuat.ac.jp>"]
name = "stm32h562"
edition = "2021"
version = "0.1.0"

[dependencies]
cortex-m = { version = "^0.7.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7.4"
panic-halt = "0.2.0"
# rtic = { version = "2.0.0", features = ["thumbv8m.main-none-eabihf"] }
# stm32h5 = { version = "0.15.1", features = ["stm32h562", "rt"]}
# embassy-stm32 = { version = "0.1.0", features = ["stm32h562ri", "time-driver-any", "memory-x", "exti", "unstable-pac", "low-power"] }
embassy-stm32 = { version = "0.1.0", features = [ "time-driver-any", "stm32h562ri", "memory-x", "unstable-pac", "exti"]  }
# embassy-time = { version = "0.3.1", features = ["tick-hz-32_768"] }

[[bin]]
name = "stm32h562"
test = false
bench = false

[profile.release]
codegen-units = 1 # better optimizations
debug = true # symbols are nice and they don't increase the size on Flash
lto = true # better optimizations
