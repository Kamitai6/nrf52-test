[package]
authors = ["22266507 <s225130t@st.go.tuat.ac.jp>"]
name = "stm32h743"
edition = "2021"
version = "0.1.0"

[dependencies]
rtt-target = "0.5.0"
panic-rtt-target = { version = "0.1.3" }
# heapless = { version = "0.8", default-features = false }
# smoltcp = { version = "0.11.0", default-features = false, features = ["medium-ethernet", "proto-ipv4", "socket-raw"]}
# smoltcp = { version = "0.12.0", default-features = false, features = ["phy-raw_socket","socket-raw","socket-udp","proto-ipv4"]}
rtic = { version = "2.1.1", features = ["thumbv7-backend"] }
# stm32h7xx-hal = {version = "0.16.0", path = "./stm32h7xx-hal", features = ["stm32h743v","rt","ethernet"]}
cortex-m = { version = "^0.7.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7.3"
hal = { package = "stm32-hal2", version = "1.8.5", features = ["h743v", "h7rt"]}

# cargo build/run
[profile.dev]
opt-level = 0
codegen-units = 16
debug = true
debug-assertions = true
overflow-checks = true

# cargo build/run --release
[profile.release]
opt-level = "s"
codegen-units = 1
debug = 2
debug-assertions = false
overflow-checks = false
lto = 'fat'
